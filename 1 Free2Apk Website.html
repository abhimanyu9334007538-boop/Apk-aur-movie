<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>APK MOVIES - AppZone</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
:root{--p:#6331e0;--bg:#f9f9fc;--c:#fff;--td:#1e1e24;--tg:#757585;--b:#ececf1}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--td);overflow-x:hidden;padding-bottom:80px}
header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:var(--c);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:100}
.logo-box{background:var(--p);width:32px;height:32px;border-radius:8px;display:flex;justify-content:center;align-items:center}
.logo-box svg{width:18px;fill:#fff}
.logo-text h1{font-size:1rem;font-weight:800}
.logo-text span{font-size:.6rem;color:var(--tg)}
.search-icon{width:24px;fill:var(--td);cursor:pointer}
.search-wrap{display:flex;margin:15px;border:1px solid var(--b);border-radius:8px;background:var(--bg)}
.search-wrap input{flex:1;padding:12px;border:none;background:0 0;outline:none;font-size:.9rem}
.search-wrap button{background:var(--p);color:#fff;border:none;padding:0 20px;font-weight:600;border-radius:0 8px 8px 0;cursor:pointer}
.banner img{width:calc(100% - 30px);margin:0 15px;border-radius:12px;object-fit:cover;box-shadow:0 4px 15px rgba(99,49,224,.2)}
.cats{display:flex;gap:15px;padding:15px;overflow-x:auto;scrollbar-width:none}
.cat-item{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:60px;cursor:pointer}
.cat-icon{width:45px;height:45px;background:#f0eaff;border-radius:12px;display:flex;justify-content:center;align-items:center}
.cat-icon svg{width:20px;fill:var(--p)}
.cat-item span{font-size:.65rem;font-weight:600;color:var(--tg)}
.sec{padding:15px}
.sec-hdr{display:flex;justify-content:space-between;margin-bottom:10px;align-items:center}
.sec-hdr h2{font-size:1.1rem;font-weight:800}
.sec-hdr a{font-size:.8rem;color:var(--p);text-decoration:none;font-weight:600}
.scroll{display:flex;gap:15px;overflow-x:auto;scrollbar-width:none;padding-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
.l-list{display:grid;grid-template-columns:1fr;gap:15px} /* Long List Class */
.card{background:var(--c);border-radius:12px;padding:15px;text-align:center;border:1px solid var(--b);display:flex;flex-direction:column;align-items:center;cursor:pointer}
.card img{width:50px;height:50px;border-radius:10px;margin-bottom:8px;object-fit:contain}
.m-card{position:relative;border-radius:12px;display:flex;flex-direction:column;cursor:pointer}
.m-card img{width:100%;height:180px;border-radius:12px;object-fit:cover;margin-bottom:8px;border:1px solid var(--b)}
.hd{position:absolute;top:8px;left:8px;background:var(--p);color:#fff;font-size:.6rem;padding:2px 6px;border-radius:4px;font-weight:bold}
.title{font-size:.85rem;font-weight:700;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
.sub{font-size:.65rem;color:var(--tg)}
.nav{position:fixed;bottom:0;width:100%;height:65px;background:var(--c);border-top:1px solid var(--b);display:flex;justify-content:space-around;align-items:center;z-index:1000}
.n-item{display:flex;flex-direction:column;align-items:center;color:var(--tg);width:33%;cursor:pointer}
.n-item.act{color:var(--p)}
.n-item svg{width:22px;fill:currentColor;margin-bottom:2px}
.n-ctr{background:var(--p);color:#fff;width:50px;height:50px;border-radius:50%;display:flex;justify-content:center;align-items:center;transform:translateY(-15px);box-shadow:0 4px 15px rgba(99,49,224,.4)}
.n-ctr svg{fill:#fff;margin:0}
</style>
</head>
<body>
<header>
<div class="logo-container" style="display:flex;gap:10px;align-items:center">
<div class="logo-box"><svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg></div>
<div class="logo-text"><h1>APK MOVIES</h1><span>DOWNLOADER</span></div>
</div>
<svg class="search-icon" onclick="document.getElementById('si').focus()" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
</header>
<div class="search-wrap"><input type="text" id="si" placeholder="Search apps, movies..." onkeyup="srch()"><button onclick="srch()">Search</button></div>
<div id="home">
<div class="banner"><img src="https://www.image2url.com/r2/default/images/1776869502759-de7ceade-d465-4126-9cf9-ed179ad01599.jpg"></div>
<div class="cats" id="cat">
<div class="cat-item" onclick="flt('APP')"><div class="cat-icon"><svg viewBox="0 0 24 24"><path d="M17.6 9.48l1.84-3.18c.16-.31.04-.69-.26-.85-.29-.15-.65-.06-.83.22l-1.88 3.24c-2.86-1.21-6.08-1.21-8.94 0L5.65 5.67c-.19-.29-.58-.38-.87-.2-.28.18-.37.54-.22.83L6.4 9.48C3.3 11.25 1.28 14.44 1 18h22c-.28-3.56-2.3-6.75-5.4-8.52zM7 15.25c-.69 0-1.25-.56-1.25-1.25s.56-1.25 1.25-1.25 1.25.56 1.25 1.25-.56 1.25-1.25 1.25zm10 0c-.69 0-1.25-.56-1.25-1.25s.56-1.25 1.25-1.25 1.25.56 1.25 1.25-.56 1.25-1.25 1.25z"/></svg></div><span>APPS</span></div>
<div class="cat-item" onclick="flt('MOVIE')"><div class="cat-icon"><svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg></div><span>MOVIES</span></div>
<div class="cat-item" onclick="flt('SHOW')"><div class="cat-icon"><svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg></div><span>SHOWS</span></div>
<div class="cat-item" onclick="flt('GAME')"><div class="cat-icon"><svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg></div><span>GAMES</span></div>
</div>
<div class="sec"><div class="sec-hdr"><h2>Latest APKs</h2><a href="javascript:void(0)" onclick="flt('APP')">View All ></a></div><div class="scroll" id="a-list"></div></div>
<div class="sec"><div class="sec-hdr"><h2>Latest Movies</h2><a href="javascript:void(0)" onclick="flt('MOVIE')">View All ></a></div><div class="scroll" id="m-list"></div></div>
</div>
<div id="list" class="sec" style="display:none">
<div class="sec-hdr"><h2 id="lt">Results</h2><a href="javascript:void(0)" onclick="flt('ALL')">Clear X</a></div>
<div class="grid" id="f-list"></div>
</div>

<div style="text-align:center;padding:15px;font-size:.75rem;color:var(--tg);font-weight:600;margin-bottom:10px">Developed by - babhan</div>

<div class="nav">
<div class="n-item act" onclick="flt('ALL');act(this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span style="font-size:.65rem;font-weight:600">Home</span></div>
<div class="n-item n-ctr" onclick="flt('APP')"><svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg></div>
<div class="n-item" onclick="flt('ALL_LIST');act(this)"><svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg><span style="font-size:.65rem;font-weight:600">Categories</span></div>
</div>

<script>
let gD=[];
function act(e){document.querySelectorAll('.n-item').forEach(n=>n.classList.remove('act'));e.classList.add('act')}
firebase.initializeApp({apiKey:"AIzaSyD21R9UM_jzngHC0r4vIS41KEtO6rLL-uA",databaseURL:"https://email-id-to-info-default-rtdb.firebaseio.com",projectId:"email-id-to-info"});
firebase.database().ref('app_content').on('value',s=>{
let d=s.val();gD=[];if(d)Object.keys(d).forEach(k=>gD.push({id:k,...d[k]}));gD.reverse();flt('ALL');
});
function srch(){
let q=document.getElementById('si').value.toLowerCase();
if(!q.trim()){flt('ALL');return}
show('Search: '+q,gD.filter(i=>i.title&&i.title.toLowerCase().includes(q)));
}
function flt(c){
if(c==='ALL'){
document.getElementById('home').style.display='block';document.getElementById('list').style.display='none';document.getElementById('si').value='';
rndr(gD.filter(i=>cT(i,'APP')),'a-list',1);rndr(gD.filter(i=>cT(i,'MOVIE')),'m-list',0);
}else if(c==='ALL_LIST'){
show('All Items',gD,1); // '1' triggers the long list mode
}else{show(c+' Collection',gD.filter(i=>cT(i,c)),0)}
}
function cT(i,e){
let t=(i.type||'').toUpperCase();
if(e==='APP')return t.includes('APP')||t.includes('APK')||t.includes('GAME')||(!t.includes('MOVIE')&&!t.includes('SHOW')&&!t.includes('MUSIC'));
return t.includes(e);
}
function show(t,d,isLongList=0){
document.getElementById('home').style.display='none';document.getElementById('list').style.display='block';document.getElementById('lt').innerText=t;
if(!t.includes('Search'))document.querySelectorAll('.n-item').forEach(n=>n.classList.remove('act'));
document.getElementById('f-list').className=isLongList?'l-list':'grid'; // Toggle between grid and long list
rndr(d,'f-list',1,1);
}
function rndr(d,id,ia,im=0){
let c=document.getElementById(id);c.innerHTML="";
if(!d.length){c.innerHTML="<p style='padding:10px;text-align:center;width:100%;color:var(--tg)'>No items found.</p>";return}
d.forEach(i=>{
let u=ia;if(im)u=cT(i,'APP');
if(u){
c.innerHTML+=`<div class="card" onclick="window.open('${i.link}','_blank')" style="${im?'width:100%':'min-width:130px'}"><img src="${i.img}" onerror="this.src='https://via.placeholder.com/50'"><div class="title">${i.title}</div><div class="sub">${i.quality||''}</div><div class="sub">${i.size||''}</div></div>`;
}else{
let hd=(i.quality||'').toLowerCase().includes('hd')||(i.quality||'').toLowerCase().includes('1080')||(i.quality||'').toLowerCase().includes('4k')?`<div class="hd">HD</div>`:'';
c.innerHTML+=`<div class="m-card" onclick="window.open('${i.link}','_blank')" style="${im?'width:100%':'min-width:140px'}">${hd}<img src="${i.img}" onerror="this.src='https://via.placeholder.com/150'"><div class="title">${i.title}</div><div class="sub">${i.quality||''} • ${i.size||''}</div></div>`;
}
});
}
</script>
<script src="https://pl29230355.profitablecpmratenetwork.com/9b/15/8d/9b158dfc4e3971f30e36df904a5a060a.js"></script>
</body>
</html>
